<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f4f5f7; color: #1a2233; }
  button { cursor: pointer; border: 1px solid #d8dce3; border-radius: 8px; background: #fff; padding: 7px 14px; font-size: 13px; font-family: inherit; }
  button:hover { background: #f0f2f5; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: #0b2545; color: #fff; border-color: #0b2545; }
  button.primary:hover { background: #133a6b; }
  input, select, textarea { border: 1px solid #d8dce3; border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; background: #fff; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: #8a94a6; padding: 8px 10px; border-bottom: 1px solid #e4e7ec; }
  td { padding: 10px; font-size: 13px; border-bottom: 1px solid #eef0f3; }
  tr:hover td { background: #fafbfc; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; display: inline-block; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e4e7ec; padding: 16px 18px; }
  .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: #b8c2d4; font-size: 14px; border-radius: 8px; cursor: pointer; margin: 2px 10px; }
  .sidebar-link:hover { background: rgba(255,255,255,0.06); }
  .sidebar-link.active { background: #fff; color: #0b2545; font-weight: 600; }
  .tab-btn { padding: 10px 4px; font-size: 13px; border: none; border-bottom: 2px solid transparent; border-radius: 0; background: transparent; color: #6b7280; }
  .tab-btn.active { color: #0b2545; border-bottom-color: #0b2545; font-weight: 600; }
  .dropzone { border: 2px dashed #d8dce3; border-radius: 10px; padding: 24px; text-align: center; color: #6b7280; font-size: 13px; cursor: pointer; }
  .dropzone.dragover { border-color: #0b2545; background: #f0f4fa; }
</style>

function formatBRL(v) {
  return (v||0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function formatBRLCompacto(v) {
  v = v || 0;
  if (Math.abs(v) >= 1000000) return 'R$ ' + (v/1000000).toFixed(2).replace(/\.?0+$/,'') + 'M';
  if (Math.abs(v) >= 1000) return 'R$ ' + (v/1000).toFixed(0) + 'k';
  return formatBRL(v);
}
function formatData(d) {
  if (!d || d === '-') return '-';
  return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
}
function totalEtapas(c) { return c.etapas.reduce(function(s,e){ return s + e.valor; }, 0); }
function totalPago(c) { return c.pagamentos.reduce(function(s,p){ return s + p.valor; }, 0); }
function saldoRestante(c) { return totalEtapas(c) - totalPago(c); }
function pctPago(c) { var t = totalEtapas(c); return t > 0 ? Math.min(100, Math.round((totalPago(c)/t)*100)) : 0; }

function statusKey(c) {
  var saldo = saldoRestante(c);
  var sp = (c.statusProcessual||'').toLowerCase();
  if (sp.indexOf('arquivado') !== -1 || sp.indexOf('não obteve êxito') !== -1 || sp.indexOf('nao obteve') !== -1 || sp.indexOf('encerrado') !== -1) return 'encerrado';
  if (c.pendencias.length > 0) return 'pendencia';
  if (saldo <= 0 && totalEtapas(c) > 0) return 'pago';
  return 'ativo';
}
function badge(key) {
  var s = STATUS_STYLES[key];
  return '<span class="badge" style="background:' + s.bg + ';color:' + s.text + ';">' + s.label + '</span>';
}
function associadosDoContrato(c) {
  var ids = c.associadosIds || [];
  return associadosGlobais.filter(function(a){ return ids.indexOf(a.id) !== -1; });
}

function salvar() {
  return window.storage.set(STORAGE_KEY, JSON.stringify(contratos), false)['catch'](function(e){ console.error('Erro ao salvar', e); });
}
function salvarAssociados() {
  return window.storage.set(ASSOCIADOS_KEY, JSON.stringify(associadosGlobais), false)['catch'](function(e){ console.error('Erro ao salvar associados', e); });
}
function salvarAtas() {
  return window.storage.set(ATAS_KEY, JSON.stringify(atas), false)['catch'](function(e){ console.error('Erro ao salvar atas', e); });
}

function carregar() {
  var p1 = window.storage.get(STORAGE_KEY, false).then(function(r){
    contratos = r ? JSON.parse(r.value) : seedInicial();
  })['catch'](function(e){
    contratos = seedInicial();
  });

  var p2 = window.storage.get(ASSOCIADOS_KEY, false).then(function(ra){
    associadosGlobais = ra ? JSON.parse(ra.value) : seedAssociados();
  })['catch'](function(e){
    associadosGlobais = seedAssociados();
  });

  var p3 = window.storage.get(ATAS_KEY, false).then(function(rt){
    atas = rt ? JSON.parse(rt.value) : [];
  })['catch'](function(e){
    atas = [];
  });

  Promise.all([p1, p2, p3]).then(function(){
    loaded = true;
    render();
  });
}

function novoContratoVazio() {
  return {
    id: Date.now(),
    escritorio: '', objeto: '', processo: '', rcdAge: '', associadosIds: [], dataContratacao: '', responsavel: '',
    observacoes: '', statusProcessual: '',
    etapas: [], pagamentos: [], pendencias: [], documentos: [], movimentacoes: []
  };
}

function render() {
  var app = document.getElementById('app');
  if (!loaded) { app.innerHTML = '<p style="padding:24px; font-size:13px; color:#666;">Carregando...</p>'; return; }

  app.innerHTML = '<div style="display:flex; min-height:100vh;">' +
      renderSidebar() +
      '<div style="flex:1; min-width:0;">' +
        renderTopbar() +
        '<div style="padding:24px;">' + renderTela() + '</div>' +
      '</div>' +
    '</div>';

  bindEvents();
}

function renderSidebar() {
  var items = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'contratos', label: 'Contratos' },
    { id: 'escritorios', label: 'Escritorios' },
    { id: 'pagamentos', label: 'Pagamentos' },
    { id: 'associados', label: 'Associados' },
    { id: 'atas', label: 'Atas' },
    { id: 'relatorios', label: 'Relatorios' },
    { id: 'documentos', label: 'Documentos' }
  ];
  var linksHtml = items.map(function(it){
    return '<div class="sidebar-link ' + (telaAtiva === it.id ? 'active' : '') + '" data-tela="' + it.id + '">' +
        '<span style="width:18px; text-align:center;">' + (it.id === telaAtiva ? '\u25cf' : '\u25cb') + '</span>' +
        '<span>' + it.label + '</span>' +
      '</div>';
  }).join('');
  return '<div style="width:230px; background:#0b2545; flex-shrink:0; padding-bottom:16px; display:flex; flex-direction:column;">' +
    '<div style="padding:22px 18px 18px;">' +
      '<div style="color:#fff; font-weight:700; font-size:18px; letter-spacing:0.02em;">ATP</div>' +
      '<div style="color:#8aa0c2; font-size:11px; margin-top:2px; line-height:1.3;">Associacao de Terminais<br/>Portuarios Privados</div>' +
    '</div>' +
    '<div style="flex:1;">' + linksHtml + '</div>' +
    '<div style="padding:14px 18px; border-top:1px solid rgba(255,255,255,0.1); color:#cfd8e6; font-size:12px;">' +
      '<div style="font-weight:600; color:#fff;">Aline Costa</div>' +
      '<div>Administrativo</div>' +
    '</div>' +
  '</div>';
}

function renderTopbar() {
  var titulos = {
    dashboard: 'Painel de Contratos Juridicos ATP', contratos: 'Contratos', escritorios: 'Escritorios',
    pagamentos: 'Pagamentos', associados: 'Associados', atas: 'Atas e Deliberacoes', relatorios: 'Relatorios', documentos: 'Documentos'
  };
  var totalPendencias = contratos.reduce(function(s,c){ return s + c.pendencias.length; }, 0);
  var sino = totalPendencias > 0 ? ('<span style="position:absolute; top:-6px; right:-10px; background:#dc2626; color:#fff; font-size:10px; border-radius:999px; padding:1px 5px;">' + totalPendencias + '</span>') : '';
  return '<div style="background:#fff; border-bottom:1px solid #e4e7ec; padding:18px 24px; display:flex; justify-content:space-between; align-items:center;">' +
    '<h1 style="margin:0; font-size:20px; font-weight:700; color:#0b2545;">' + titulos[telaAtiva] + '</h1>' +
    '<div style="display:flex; align-items:center; gap:16px;">' +
      '<span style="position:relative; font-size:18px;">\uD83D\uDD14' + sino + '</span>' +
    '</div>' +
  '</div>';
}

function renderTela() {
  if (telaAtiva === 'dashboard') return renderDashboard();
  if (telaAtiva === 'contratos') return renderContratos();
  if (telaAtiva === 'escritorios') return renderEscritorios();
  if (telaAtiva === 'pagamentos') return renderPagamentos();
  if (telaAtiva === 'associados') return renderAssociados();
  if (telaAtiva === 'atas') return renderAtas();
  if (telaAtiva === 'relatorios') return renderRelatorios();
  if (telaAtiva === 'documentos') return renderDocumentos();
  return '';
}

function renderDashboard() {
  var ativos = contratos.filter(function(c){ return statusKey(c) !== 'encerrado'; }).length;
  var encerrados = contratos.filter(function(c){ return statusKey(c) === 'encerrado'; }).length;
  var totalContratado = contratos.reduce(function(s,c){ return s + totalEtapas(c); }, 0);
  var totalPendente = contratos.reduce(function(s,c){ return s + saldoRestante(c); }, 0);

  return '<div style="display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; margin-bottom:24px;">' +
      kpiCard('#dbeafe', '#1d4ed8', 'Contratos ativos', ativos) +
      kpiCard('#e5e7eb', '#374151', 'Contratos encerrados', encerrados) +
      kpiCard('#dcfce7', '#15803d', 'Valores contratados', formatBRL(totalContratado)) +
      kpiCard('#ffedd5', '#c2410c', 'Pagamentos pendentes', formatBRL(totalPendente)) +
    '</div>' +
    renderTabelaContratos() +
    (contratoSelecionadoId ? renderDetalheContrato() : '');
}

function kpiCard(bg, fg, label, value) {
  return '<div class="card">' +
    '<div style="font-size:13px; color:#6b7280; margin-bottom:6px;">' + label + '</div>' +
    '<div style="font-size:20px; font-weight:700; color:#0b2545;">' + value + '</div>' +
  '</div>';
}

function contratosFiltrados() {
  return contratos.filter(function(c){
    if (filtros.escritorio !== 'Todos' && c.escritorio !== filtros.escritorio) return false;
    if (filtros.status !== 'Todos' && STATUS_STYLES[statusKey(c)].label !== filtros.status) return false;
    if (filtros.apenasPendencias && c.pendencias.length === 0) return false;
    if (filtros.busca && (c.escritorio + c.objeto).toLowerCase().indexOf(filtros.busca.toLowerCase()) === -1) return false;
    return true;
  });
}

function renderTabelaContratos() {
  var lista = contratosFiltrados();
  var escritoriosUnicos = ['Todos'].concat(contratos.map(function(c){ return c.escritorio; }).filter(function(v,i,a){ return a.indexOf(v)===i; }));
  var statusUnicos = ['Todos'].concat(Object.keys(STATUS_STYLES).map(function(k){ return STATUS_STYLES[k].label; }).filter(function(v,i,a){ return a.indexOf(v)===i; }));

  var linhas = lista.map(function(c){
    return '<tr style="cursor:pointer;" data-ver-contrato="' + c.id + '">' +
        '<td style="font-weight:600;">' + c.escritorio + '</td>' +
        '<td>' + c.objeto + '</td>' +
        '<td>' + badge(statusKey(c)) + '</td>' +
        '<td style="text-align:right;">' + formatBRL(totalEtapas(c)) + '</td>' +
        '<td style="text-align:right; color:#15803d;">' + formatBRL(totalPago(c)) + '</td>' +
        '<td style="text-align:right; color:' + (saldoRestante(c)>0?'#dc2626':'#15803d') + ';">' + formatBRL(saldoRestante(c)) + '</td>' +
        '<td style="font-size:12px; color:#6b7280;">' + (c.rcdAge || '-') + '</td>' +
        '<td><button data-ver-contrato="' + c.id + '" aria-label="Ver detalhes">ver</button></td>' +
      '</tr>';
  }).join('');

  return '<div class="card">' +
    '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;">' +
      '<h3 style="margin:0; font-size:15px; color:#0b2545;">Contratos</h3>' +
      '<button class="primary" id="btn-novo">+ Novo contrato</button>' +
    '</div>' +
    '<div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:flex-end;">' +
      '<div><label style="font-size:11px; color:#6b7280; display:block; margin-bottom:3px;">Escritorio</label>' +
        '<select id="f-escritorio">' + escritoriosUnicos.map(function(e){ return '<option ' + (filtros.escritorio===e?'selected':'') + '>' + e + '</option>'; }).join('') + '</select></div>' +
      '<div><label style="font-size:11px; color:#6b7280; display:block; margin-bottom:3px;">Status</label>' +
        '<select id="f-status">' + statusUnicos.map(function(s){ return '<option ' + (filtros.status===s?'selected':'') + '>' + s + '</option>'; }).join('') + '</select></div>' +
      '<div><label style="font-size:11px; color:#6b7280; display:block; margin-bottom:3px;">Buscar</label>' +
        '<input id="f-busca" type="text" placeholder="Escritorio ou objeto" value="' + filtros.busca + '" /></div>' +
      '<label style="display:flex; align-items:center; gap:6px; font-size:12px; color:#374151; padding-bottom:7px;">' +
        '<input id="f-pendencias" type="checkbox" ' + (filtros.apenasPendencias?'checked':'') + ' style="width:auto;" /> Apenas com pendencias</label>' +
      '<button id="f-limpar" style="margin-left:auto;">Limpar filtros</button>' +
    '</div>' +
    '<div style="overflow-x:auto;"><table>' +
      '<tr><th>Escritorio</th><th>Objeto / Assunto</th><th>Status</th><th style="text-align:right;">Valor Total</th>' +
        '<th style="text-align:right;">Pago</th><th style="text-align:right;">Pendente</th><th>RCD/AGE</th><th></th></tr>' +
      linhas +
    '</table>' +
    (lista.length === 0 ? '<p style="text-align:center; color:#9ca3af; font-size:13px; padding:24px;">Nenhum contrato encontrado com esses filtros.</p>' : '') +
    '</div>' +
    (novoContratoAberto ? formNovoContrato() : '') +
  '</div>';
}

function renderContratos() {
  return renderTabelaContratos() + (contratoSelecionadoId ? renderDetalheContrato() : '');
}

function formNovoContrato() {
  return '<div style="background:#f8f9fb; border:1px solid #e4e7ec; border-radius:10px; padding:16px; margin-top:16px;">' +
    '<p style="font-weight:600; font-size:14px; margin:0 0 12px;">Cadastrar novo contrato</p>' +
    '<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;">' +
      '<input type="text" id="nc-escritorio" placeholder="Escritorio / parte" />' +
      '<input type="text" id="nc-processo" placeholder="Numero do processo" />' +
    '</div>' +
    '<input type="text" id="nc-objeto" placeholder="Assunto / objeto" style="width:100%; margin-bottom:8px;" />' +
    '<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px;">' +
      '<input type="text" id="nc-rcdage" placeholder="RCD/AGE (opcional)" />' +
      '<input type="number" id="nc-associados" placeholder="No de associados" />' +
      '<input type="text" id="nc-responsavel" placeholder="Responsavel" />' +
    '</div>' +
    '<input type="text" id="nc-statusproc" placeholder="Status processual" style="width:100%; margin-bottom:8px;" />' +
    '<textarea id="nc-observacoes" rows="2" placeholder="Observacoes" style="width:100%; margin-bottom:10px;"></textarea>' +
    '<div style="display:flex; gap:8px;"><button class="primary" id="nc-salvar">Salvar contrato</button><button id="nc-cancelar">Cancelar</button></div>' +
  '</div>';
}

function renderDetalheContrato() {
  var c = null;
  for (var i=0;i<contratos.length;i++) { if (contratos[i].id === contratoSelecionadoId) { c = contratos[i]; break; } }
  if (!c) return '';
  var tabs = [
    { id: 'dados', label: 'Dados Gerais' },
    { id: 'financeiro', label: 'Financeiro' },
    { id: 'pagamentos', label: 'Pagamentos' },
    { id: 'status', label: 'Status Processual' },
    { id: 'documentos', label: 'Documentos' },
    { id: 'obs', label: 'Observacoes Internas' },
    { id: 'historico', label: 'Historico' }
  ];
  var tabsHtml = tabs.map(function(t){
    return '<button class="tab-btn ' + (abaDetalhe===t.id?'active':'') + '" data-aba-detalhe="' + t.id + '">' + t.label + '</button>';
  }).join('');

  var corpo = '';
  if (abaDetalhe === 'dados') corpo = renderAbaDados(c);
  else if (abaDetalhe === 'financeiro') corpo = renderAbaFinanceiro(c);
  else if (abaDetalhe === 'pagamentos') corpo = renderAbaPagamentos(c);
  else if (abaDetalhe === 'status') corpo = renderAbaStatus(c);
  else if (abaDetalhe === 'documentos') corpo = renderAbaDocumentos(c);
  else if (abaDetalhe === 'obs') corpo = renderAbaObs(c);
  else if (abaDetalhe === 'historico') corpo = renderAbaHistorico(c);

  return '<div class="card" style="margin-top:20px;">' +
    '<div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px;">' +
      '<div><h3 style="margin:0 0 4px; font-size:16px; color:#0b2545;">Detalhes do Contrato</h3>' +
      '<p style="margin:0; font-size:13px; color:#6b7280;">' + c.escritorio + ' - ' + c.objeto + '</p></div>' +
      '<div style="display:flex; gap:8px;"><button id="btn-fechar-detalhe">Fechar</button>' +
      '<button data-del-contrato="' + c.id + '" style="color:#dc2626;">Excluir</button></div>' +
    '</div>' +
    '<div style="display:flex; gap:18px; border-bottom:1px solid #e4e7ec; margin:16px 0; flex-wrap:wrap;">' + tabsHtml + '</div>' +
    corpo +
  '</div>';
}

function campoLinha(label, valor) {
  return '<div style="display:flex; padding:8px 0; border-bottom:1px solid #f1f2f4; font-size:13px;">' +
    '<div style="width:160px; color:#6b7280; flex-shrink:0;">' + label + '</div><div style="font-weight:500;">' + valor + '</div></div>';
}

function renderAbaDados(c) {
  var vinculados = associadosDoContrato(c);
  var idsVinculados = c.associadosIds || [];
  var naoVinculados = associadosGlobais.filter(function(a){ return idsVinculados.indexOf(a.id) === -1; });

  var vinculadosHtml = vinculados.length === 0
    ? '<p style="font-size:13px; color:#9ca3af; margin-bottom:10px;">Nenhum associado vinculado ainda.</p>'
    : '<div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;">' +
        vinculados.map(function(a){
          return '<span style="background:#eef2f8; border-radius:999px; padding:5px 10px 5px 12px; font-size:12px; display:inline-flex; align-items:center; gap:6px;">' +
            a.nome + ' <button data-desvincular-assoc="' + c.id + ':' + a.id + '" aria-label="Remover" style="padding:1px 6px; border:none; background:transparent;">x</button></span>';
        }).join('') +
      '</div>';

  var pendenciasHtml = c.pendencias.length > 0
    ? '<div class="card" style="background:#fff1ee; border-color:#ffd6c7;">' +
        '<p style="font-weight:600; font-size:13px; margin:0 0 8px; color:#c2410c;">Pendencias do Contrato (' + c.pendencias.length + ')</p>' +
        c.pendencias.map(function(p){
          return '<div style="margin-bottom:8px; font-size:12px;"><div>' + p.texto + '</div>' +
            '<div style="color:#9a5b3a; margin-top:2px;">Tipo: ' + (p.tipo||'-') + ' - Condicao: ' + (p.condicao||'-') + '</div></div>';
        }).join('') +
      '</div>'
    : '';

  return '<div style="display:grid; grid-template-columns:1.3fr 1fr; gap:24px;">' +
    '<div>' +
      campoLinha('Escritorio', c.escritorio) +
      campoLinha('Objeto / Assunto', c.objeto) +
      campoLinha('Processo No', c.processo || '-') +
      campoLinha('RCD/AGE', c.rcdAge || '-') +
      campoLinha('Data da contratacao', c.dataContratacao || '-') +
      campoLinha('Responsavel', c.responsavel || '-') +
      campoLinha('Observacoes', (c.observacoes||'-').slice(0,180) + ((c.observacoes||'').length>180?'...':'')) +
      '<p style="font-weight:600; font-size:13px; margin:18px 0 10px; color:#0b2545;">Associados vinculados (' + vinculados.length + ')</p>' +
      vinculadosHtml +
      '<div style="display:flex; gap:8px;">' +
        '<select id="assoc-add-' + c.id + '" style="flex:1;"><option value="">Vincular associado cadastrado...</option>' +
          naoVinculados.map(function(a){ return '<option value="' + a.id + '">' + a.nome + '</option>'; }).join('') +
        '</select><button data-vincular-assoc="' + c.id + '">Vincular</button>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex; flex-direction:column; gap:14px;">' +
      '<div class="card" style="background:#f8f9fb;">' +
        '<p style="font-weight:600; font-size:13px; margin:0 0 10px; color:#0b2545;">Resumo Financeiro</p>' +
        campoLinha('Valor Total', formatBRL(totalEtapas(c))) +
        c.etapas.map(function(e){ return campoLinha(e.nome, formatBRL(e.valor)); }).join('') +
        '<div style="display:flex; justify-content:space-between; padding-top:10px; margin-top:6px;">' +
          '<span style="color:#15803d; font-weight:600; font-size:13px;">Total Pago</span>' +
          '<span style="color:#15803d; font-weight:700; font-size:14px;">' + formatBRL(totalPago(c)) + '</span></div>' +
        '<div style="display:flex; justify-content:space-between;">' +
          '<span style="color:#dc2626; font-weight:600; font-size:13px;">Pendente</span>' +
          '<span style="color:#dc2626; font-weight:700; font-size:14px;">' + formatBRL(saldoRestante(c)) + '</span></div>' +
      '</div>' +
      '<div class="card"><p style="font-weight:600; font-size:13px; margin:0 0 8px; color:#0b2545;">Status Atual</p>' +
        badge(statusKey(c)) + '<div style="margin-top:10px; font-size:12px; color:#6b7280;">' + (c.statusProcessual || '-') + '</div></div>' +
      pendenciasHtml +
    '</div>' +
  '</div>';
}

function renderAbaFinanceiro(c) {
  var pct = pctPago(c);
  var etapasHtml = c.etapas.map(function(e){
    return '<tr><td>' + e.nome + '</td><td style="text-align:right; font-weight:600;">' + formatBRL(e.valor) + '</td>' +
      '<td style="width:30px; text-align:right;"><button data-del-etapa="' + c.id + ':' + e.id + '">x</button></td></tr>';
  }).join('');
  return '<div style="margin-bottom:18px;">' +
    '<div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:13px;"><span>' + pct + '% pago</span>' +
    '<span>' + formatBRL(totalPago(c)) + ' de ' + formatBRL(totalEtapas(c)) + '</span></div>' +
    '<div style="width:100%; height:10px; background:#eef0f3; border-radius:999px; overflow:hidden;">' +
    '<div style="height:100%; width:' + pct + '%; background:#0b2545; border-radius:999px;"></div></div>' +
  '</div>' +
  '<p style="font-weight:600; font-size:13px; margin:0 0 10px; color:#0b2545;">Etapas de pagamento</p>' +
  '<table style="margin-bottom:14px;">' + etapasHtml + '</table>' +
  '<div style="display:flex; gap:8px;"><input type="text" id="etapa-nome-' + c.id + '" placeholder="Nome da etapa" style="flex:2;" />' +
    '<input type="number" id="etapa-valor-' + c.id + '" placeholder="Valor" style="flex:1;" /><button data-add-etapa="' + c.id + '">Adicionar</button></div>';
}

function renderAbaPagamentos(c) {
  var pgtosHtml = c.pagamentos.map(function(p){
    return '<tr><td>' + formatData(p.data) + '</td><td>' + p.descricao + '</td><td>' + p.nf + '</td>' +
      '<td style="text-align:right; font-weight:600;">' + formatBRL(p.valor) + '</td></tr>';
  }).join('');
  var pendHtml = c.pendencias.length===0 ? '<p style="font-size:13px; color:#9ca3af;">Nenhuma pendencia</p>' :
    c.pendencias.map(function(p){
      return '<div style="background:#fff1ee; border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:8px; display:flex; justify-content:space-between; gap:8px;">' +
        '<span>' + p.texto + (p.verificarCom?' <span style="font-size:11px;color:#9a5b3a;">(verificar com '+p.verificarCom+')</span>':'') + '</span>' +
        '<button data-del-pend="' + c.id + ':' + p.id + '">ok</button></div>';
    }).join('');
  return '<table style="margin-bottom:14px;"><tr><th>Data</th><th>Descricao</th><th>NF</th><th style="text-align:right;">Valor</th></tr>' + pgtosHtml + '</table>' +
  '<div style="display:grid; grid-template-columns:110px 1fr 80px 100px auto; gap:8px; margin-bottom:18px;">' +
    '<input type="date" id="pgto-data-' + c.id + '" /><input type="text" id="pgto-desc-' + c.id + '" placeholder="Descricao" />' +
    '<input type="text" id="pgto-nf-' + c.id + '" placeholder="NF" /><input type="number" id="pgto-valor-' + c.id + '" placeholder="Valor" />' +
    '<button data-add-pgto="' + c.id + '">Adicionar</button></div>' +
  '<p style="font-weight:600; font-size:13px; margin:0 0 10px; color:#0b2545;">Pendencias</p>' + pendHtml +
  '<div style="display:flex; gap:8px;"><input type="text" id="pend-texto-' + c.id + '" placeholder="Descricao da pendencia" style="flex:2;" />' +
    '<input type="text" id="pend-verificar-' + c.id + '" placeholder="Verificar com" style="flex:1;" /><button data-add-pend="' + c.id + '">Adicionar</button></div>';
}

function renderAbaStatus(c) {
  return '<div style="margin-bottom:14px;">' + badge(statusKey(c)) + '</div>' +
    '<textarea id="status-texto-' + c.id + '" rows="2" style="width:100%; margin-bottom:10px;" placeholder="Status processual">' + (c.statusProcessual||'') + '</textarea>' +
    '<button data-salvar-status="' + c.id + '">Salvar status</button>';
}

function renderAbaDocumentos(c) {
  var docs = c.documentos || [];
  var docsHtml = docs.map(function(d){ return '<tr><td>' + d.nome + '</td><td>' + formatData(d.data) + '</td></tr>'; }).join('');
  return '<table style="margin-bottom:14px;"><tr><th>Documento</th><th>Data</th></tr>' + docsHtml + '</table>' +
  (docs.length===0 ? '<p style="font-size:13px; color:#9ca3af; margin-bottom:14px;">Nenhum documento anexado ainda.</p>' : '') +
  '<div style="display:flex; gap:8px;"><input type="text" id="doc-nome-' + c.id + '" placeholder="Nome do documento" style="flex:2;" />' +
    '<input type="date" id="doc-data-' + c.id + '" /><button data-add-doc="' + c.id + '">Adicionar</button></div>';
}

function renderAbaObs(c) {
  return '<textarea id="obs-texto-' + c.id + '" rows="5" style="width:100%; margin-bottom:10px;">' + (c.observacoes||'') + '</textarea>' +
    '<button data-salvar-obs="' + c.id + '">Salvar observacoes</button>';
}

function renderAbaHistorico(c) {
  var movHtml = c.movimentacoes.length===0 ? '<p style="font-size:13px; color:#9ca3af; margin-bottom:12px;">Nenhuma interacao registrada ainda.</p>' :
    c.movimentacoes.map(function(m){
      return '<div style="font-size:13px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid #f1f2f4;">' +
        '<span style="font-weight:600;">' + m.autor + ':</span> ' + m.texto +
        '<span style="color:#9ca3af; font-size:11px;"> - ' + formatData(m.data) + '</span></div>';
    }).join('');
  return movHtml + '<button data-add-mov="' + c.id + '">+ Registrar interacao (juridico - financeiro)</button>';
}

function renderEscritorios() {
  var grupos = {};
  contratos.forEach(function(c){
    if (!grupos[c.escritorio]) grupos[c.escritorio] = [];
    grupos[c.escritorio].push(c);
  });
  var nomes = Object.keys(grupos);
  var cardsHtml = nomes.map(function(nome){
    var lista = grupos[nome];
    var total = lista.reduce(function(s,c){ return s+totalEtapas(c); }, 0);
    var pendente = lista.reduce(function(s,c){ return s+saldoRestante(c); }, 0);
    return '<div class="card"><p style="font-weight:600; font-size:14px; margin:0 0 8px; color:#0b2545;">' + nome + '</p>' +
      '<p style="font-size:12px; color:#6b7280; margin:0 0 10px;">' + lista.length + ' contrato(s)</p>' +
      '<div style="font-size:13px; margin-bottom:4px;">Total: <strong>' + formatBRL(total) + '</strong></div>' +
      '<div style="font-size:13px; color:' + (pendente>0?'#dc2626':'#15803d') + ';">Pendente: <strong>' + formatBRL(pendente) + '</strong></div></div>';
  }).join('');
  return '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;">' + cardsHtml + '</div>';
}

function renderPagamentos() {
  var todosPgtos = [];
  contratos.forEach(function(c){
    c.pagamentos.forEach(function(p){
      var copia = {}; for (var k in p) copia[k] = p[k];
      copia.escritorio = c.escritorio;
      todosPgtos.push(copia);
    });
  });
  todosPgtos.sort(function(a,b){ return new Date(b.data) - new Date(a.data); });

  var todasPendencias = [];
  contratos.forEach(function(c){
    c.pendencias.forEach(function(p){
      var copia = {}; for (var k in p) copia[k] = p[k];
      copia.escritorio = c.escritorio;
      copia.valor = saldoRestante(c);
      todasPendencias.push(copia);
    });
  });

  var pgtosHtml = todosPgtos.map(function(p){
    return '<tr><td>' + p.escritorio + '</td><td>' + formatData(p.data) + '</td><td>' + p.descricao + '</td><td>' + p.nf + '</td>' +
      '<td style="text-align:right; font-weight:600;">' + formatBRL(p.valor) + '</td></tr>';
  }).join('');

  var pendHtml = todasPendencias.length===0 ? '<p style="font-size:13px; color:#9ca3af;">Nenhuma pendencia aberta.</p>' :
    todasPendencias.map(function(p){
      return '<div style="background:#fff1ee; border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:8px;">' +
        '<strong>' + p.escritorio + '</strong> - ' + p.texto + (p.verificarCom?' (verificar com '+p.verificarCom+')':'') + '</div>';
    }).join('');

  return '<div class="card" style="margin-bottom:20px;">' +
    '<p style="font-weight:600; font-size:15px; margin:0 0 14px; color:#0b2545;">Historico de pagamentos</p>' +
    '<table><tr><th>Escritorio</th><th>Data</th><th>Descricao</th><th>NF</th><th style="text-align:right;">Valor</th></tr>' + pgtosHtml + '</table></div>' +
  '<div class="card"><p style="font-weight:600; font-size:15px; margin:0 0 14px; color:#0b2545;">Pendencias abertas</p>' + pendHtml + '</div>';
}

function renderAssociados() {
  var formHtml = novoAssociadoAberto ?
    '<div style="background:#f8f9fb; border:1px solid #e4e7ec; border-radius:10px; padding:14px; margin-bottom:16px; display:flex; gap:8px;">' +
      '<input type="text" id="na-nome" placeholder="Nome do associado" style="flex:2;" />' +
      '<input type="text" id="na-segmento" placeholder="Segmento (opcional)" style="flex:1;" />' +
      '<button class="primary" id="na-salvar">Salvar</button><button id="na-cancelar">Cancelar</button></div>' : '';

  var linhasHtml = associadosGlobais.map(function(a){
    var qtdContratos = contratos.filter(function(c){ return (c.associadosIds||[]).indexOf(a.id) !== -1; }).length;
    return '<tr><td style="font-weight:600;">' + a.nome + '</td><td>' + (a.segmento || '-') + '</td>' +
      '<td style="text-align:right;">' + qtdContratos + '</td>' +
      '<td style="text-align:right;"><button data-del-associado="' + a.id + '" aria-label="Remover associado">x</button></td></tr>';
  }).join('');

  var porAssociadoHtml = associadosGlobais.map(function(a){
    var lista = contratos.filter(function(c){ return (c.associadosIds||[]).indexOf(a.id) !== -1; });
    var objetos = lista.length===0 ? '-' : lista.map(function(c){ return c.objeto; }).join(', ');
    return '<tr><td style="font-weight:600;">' + a.nome + '</td><td>' + objetos + '</td></tr>';
  }).join('');

  return '<div class="card" style="margin-bottom:20px;">' +
    '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">' +
      '<h3 style="margin:0; font-size:15px; color:#0b2545;">Associados cadastrados (' + associadosGlobais.length + ')</h3>' +
      '<button class="primary" id="btn-novo-associado">+ Novo associado</button>' +
    '</div>' +
    formHtml +
    '<table><tr><th>Nome</th><th>Segmento</th><th style="text-align:right;">Contratos vinculados</th><th></th></tr>' + linhasHtml + '</table>' +
    (associadosGlobais.length === 0 ? '<p style="text-align:center; color:#9ca3af; font-size:13px; padding:20px;">Nenhum associado cadastrado ainda.</p>' : '') +
  '</div>' +
  '<div class="card"><p style="font-weight:600; font-size:15px; margin:0 0 14px; color:#0b2545;">Contratos por associado</p>' +
    '<table><tr><th>Associado</th><th>Contratos</th></tr>' + porAssociadoHtml + '</table>' +
  '</div>';
}

// ============ ATAS - com upload de planilha ============
function atasFiltradas() {
  return atas.filter(function(a){
    if (filtrosAtas.orgao !== 'Todos' && a.orgao !== filtrosAtas.orgao) return false;
    if (filtrosAtas.ano !== 'Todos' && a.ano !== filtrosAtas.ano) return false;
    if (filtrosAtas.busca) {
      var q = filtrosAtas.busca.toLowerCase();
      if (a.codigo.toLowerCase().indexOf(q) === -1 && a.texto.toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
}

function normalizarCabecalho(s) {
  return String(s||'').trim().toLowerCase()
    .replace(/[áàâã]/g,'a').replace(/[éê]/g,'e').replace(/í/g,'i').replace(/[óô]/g,'o').replace(/ú/g,'u').replace(/ç/g,'c');
}

function processarPlanilha(linhasObjetos) {
  if (!linhasObjetos || linhasObjetos.length === 0) {
    erroImportacao = 'A planilha esta vazia ou nao foi possivel ler os dados.';
    previewImportacao = null;
    render();
    return;
  }

  var primeiraLinha = linhasObjetos[0];
  var chaves = Object.keys(primeiraLinha);
  var mapa = {};
  chaves.forEach(function(k){
    var norm = normalizarCabecalho(k);
    if (norm.indexOf('orgao') !== -1) mapa.orgao = k;
    else if (norm.indexOf('ano') !== -1) mapa.ano = k;
    else if (norm.indexOf('codigo') !== -1) mapa.codigo = k;
    else if (norm.indexOf('deliber') !== -1 || norm.indexOf('texto') !== -1 || norm.indexOf('descri') !== -1) mapa.texto = k;
  });

  if (!mapa.codigo || !mapa.texto) {
    erroImportacao = 'Nao foi possivel identificar as colunas "Codigo" e "Deliberacao" na planilha. Verifique os titulos das colunas na primeira linha.';
    previewImportacao = null;
    render();
    return;
  }

  var resultado = [];
  linhasObjetos.forEach(function(linha){
    var codigo = String(linha[mapa.codigo] || '').trim();
    var texto = String(linha[mapa.texto] || '').trim();
    if (!codigo || !texto) return;
    var orgao = mapa.orgao ? String(linha[mapa.orgao] || '').trim().toUpperCase() : '';
    if (orgao !== 'AGE' && orgao !== 'RCD') {
      orgao = codigo.toUpperCase().indexOf('AGE') !== -1 ? 'AGE' : (codigo.toUpperCase().indexOf('RCD') !== -1 ? 'RCD' : 'Outro');
    }
    var ano = mapa.ano ? String(linha[mapa.ano] || '').trim() : '';
    if (!ano) {
      var m = codigo.match(/(\d{4})/);
      ano = m ? m[1] : '-';
    }
    resultado.push({ orgao: orgao, ano: ano, codigo: codigo, texto: texto });
  });

  if (resultado.length === 0) {
    erroImportacao = 'Nenhuma linha valida foi encontrada (verifique se as colunas Codigo e Deliberacao estao preenchidas).';
    previewImportacao = null;
  } else {
    erroImportacao = '';
    previewImportacao = resultado;
  }
  render();
}

function lerArquivoImportacao(file) {
  erroImportacao = '';
  previewImportacao = null;
  var nome = file.name.toLowerCase();
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = e.target.result;
      var workbook;
      if (nome.indexOf('.csv') !== -1) {
        workbook = XLSX.read(data, { type: 'binary' });
      } else {
        workbook = XLSX.read(data, { type: 'array' });
      }
      var primeiraAba = workbook.SheetNames[0];
      var planilha = workbook.Sheets[primeiraAba];
      var linhasObjetos = XLSX.utils.sheet_to_json(planilha, { defval: '' });
      processarPlanilha(linhasObjetos);
    } catch (err) {
      console.error(err);
      erroImportacao = 'Erro ao ler o arquivo. Verifique se é um .xlsx ou .csv valido.';
      previewImportacao = null;
      render();
    }
  };
  reader.onerror = function() {
    erroImportacao = 'Nao foi possivel ler o arquivo selecionado.';
    render();
  };
  if (nome.indexOf('.csv') !== -1) {
    reader.readAsBinaryString(file);
  } else {
    reader.readAsArrayBuffer(file);
  }
}

function bindEvents() {
  var app = document.getElementById('app');

  Array.prototype.forEach.call(app.querySelectorAll('[data-tela]'), function(el){
    el.onclick = function(){ telaAtiva = el.getAttribute('data-tela'); contratoSelecionadoId = null; render(); };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-ver-contrato]'), function(el){
    el.onclick = function(){ contratoSelecionadoId = parseInt(el.getAttribute('data-ver-contrato')); abaDetalhe = 'dados'; render(); };
  });

  var fechar = document.getElementById('btn-fechar-detalhe');
  if (fechar) fechar.onclick = function(){ contratoSelecionadoId = null; render(); };

  Array.prototype.forEach.call(app.querySelectorAll('[data-aba-detalhe]'), function(el){
    el.onclick = function(){ abaDetalhe = el.getAttribute('data-aba-detalhe'); render(); };
  });

  var fEsc = document.getElementById('f-escritorio'); if (fEsc) fEsc.onchange = function(){ filtros.escritorio = fEsc.value; render(); };
  var fSt = document.getElementById('f-status'); if (fSt) fSt.onchange = function(){ filtros.status = fSt.value; render(); };
  var fBusca = document.getElementById('f-busca'); if (fBusca) fBusca.oninput = function(){ filtros.busca = fBusca.value; render(); var el2 = document.getElementById('f-busca'); if(el2) el2.focus(); };
  var fPend = document.getElementById('f-pendencias'); if (fPend) fPend.onchange = function(){ filtros.apenasPendencias = fPend.checked; render(); };
  var fLimpar = document.getElementById('f-limpar'); if (fLimpar) fLimpar.onclick = function(){ filtros = { escritorio:'Todos', status:'Todos', apenasPendencias:false, busca:'' }; render(); };

  var btnNovo = document.getElementById('btn-novo'); if (btnNovo) btnNovo.onclick = function(){ novoContratoAberto = !novoContratoAberto; render(); };
  var ncCancelar = document.getElementById('nc-cancelar'); if (ncCancelar) ncCancelar.onclick = function(){ novoContratoAberto = false; render(); };
  var ncSalvar = document.getElementById('nc-salvar');
  if (ncSalvar) ncSalvar.onclick = function(){
    var escritorio = document.getElementById('nc-escritorio').value.trim();
    if (!escritorio) return;
    var c = novoContratoVazio();
    c.escritorio = escritorio;
    c.processo = document.getElementById('nc-processo').value.trim();
    c.objeto = document.getElementById('nc-objeto').value.trim();
    c.rcdAge = document.getElementById('nc-rcdage').value.trim();
    c.associadosIds = [];
    c.responsavel = document.getElementById('nc-responsavel').value.trim();
    c.statusProcessual = document.getElementById('nc-statusproc').value.trim();
    c.observacoes = document.getElementById('nc-observacoes').value.trim();
    contratos.push(c);
    novoContratoAberto = false;
    contratoSelecionadoId = c.id;
    salvar().then(render);
  };

  Array.prototype.forEach.call(app.querySelectorAll('[data-del-contrato]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-del-contrato'));
      contratos = contratos.filter(function(c){ return c.id !== id; });
      contratoSelecionadoId = null;
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-etapa]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-etapa'));
      var nome = document.getElementById('etapa-nome-'+id).value.trim();
      var valor = parseFloat(document.getElementById('etapa-valor-'+id).value);
      if (!nome || isNaN(valor)) return;
      var c = contratos.filter(function(x){ return x.id === id; })[0];
      var newId = c.etapas.reduce(function(m,e){ return Math.max(m,e.id); }, 0) + 1;
      c.etapas.push({ id:newId, nome:nome, valor:valor });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-del-etapa]'), function(el){
    el.onclick = function(){
      var partes = el.getAttribute('data-del-etapa').split(':').map(Number);
      var c = contratos.filter(function(x){ return x.id===partes[0]; })[0];
      c.etapas = c.etapas.filter(function(e){ return e.id!==partes[1]; });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-pgto]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-pgto'));
      var data = document.getElementById('pgto-data-'+id).value;
      var descricao = document.getElementById('pgto-desc-'+id).value.trim();
      var nf = document.getElementById('pgto-nf-'+id).value.trim() || '-';
      var valor = parseFloat(document.getElementById('pgto-valor-'+id).value);
      if (!data || !descricao || isNaN(valor)) return;
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      var newId = c.pagamentos.reduce(function(m,p){ return Math.max(m,p.id); }, 0) + 1;
      c.pagamentos.push({ id:newId, data:data, descricao:descricao, nf:nf, valor:valor });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-pend]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-pend'));
      var texto = document.getElementById('pend-texto-'+id).value.trim();
      var verificarCom = document.getElementById('pend-verificar-'+id).value.trim();
      if (!texto) return;
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      var newId = c.pendencias.reduce(function(m,p){ return Math.max(m,p.id); }, 0) + 1;
      c.pendencias.push({ id:newId, texto:texto, verificarCom:verificarCom, tipo:'', condicao:'' });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-del-pend]'), function(el){
    el.onclick = function(){
      var partes = el.getAttribute('data-del-pend').split(':').map(Number);
      var c = contratos.filter(function(x){ return x.id===partes[0]; })[0];
      c.pendencias = c.pendencias.filter(function(p){ return p.id!==partes[1]; });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-doc]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-doc'));
      var nome = document.getElementById('doc-nome-'+id).value.trim();
      var data = document.getElementById('doc-data-'+id).value;
      if (!nome) return;
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      if (!c.documentos) c.documentos = [];
      var newId = c.documentos.reduce(function(m,d){ return Math.max(m,d.id); }, 0) + 1;
      c.documentos.push({ id:newId, nome:nome, data:data });
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-salvar-status]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-salvar-status'));
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      c.statusProcessual = document.getElementById('status-texto-'+id).value.trim();
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-salvar-obs]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-salvar-obs'));
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      c.observacoes = document.getElementById('obs-texto-'+id).value.trim();
      salvar().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-mov]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-mov'));
      var texto = prompt('Descreva a interacao entre juridico e financeiro:');
      if (!texto) return;
      var c = contratos.filter(function(x){ return x.id===id; })[0];
      c.movimentacoes.push({ autor:'Voce', texto:texto, data:'2026-06-19' });
      salvar().then(render);
    };
  });

  var btnNovoAssoc = document.getElementById('btn-novo-associado');
  if (btnNovoAssoc) btnNovoAssoc.onclick = function(){ novoAssociadoAberto = !novoAssociadoAberto; render(); };
  var naCancelar = document.getElementById('na-cancelar');
  if (naCancelar) naCancelar.onclick = function(){ novoAssociadoAberto = false; render(); };
  var naSalvar = document.getElementById('na-salvar');
  if (naSalvar) naSalvar.onclick = function(){
    var nome = document.getElementById('na-nome').value.trim();
    if (!nome) return;
    var segmento = document.getElementById('na-segmento').value.trim();
    var newId = associadosGlobais.reduce(function(m,a){ return Math.max(m,a.id); }, 0) + 1;
    associadosGlobais.push({ id:newId, nome:nome, segmento:segmento });
    novoAssociadoAberto = false;
    salvarAssociados().then(render);
  };
  Array.prototype.forEach.call(app.querySelectorAll('[data-del-associado]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-del-associado'));
      associadosGlobais = associadosGlobais.filter(function(a){ return a.id !== id; });
      contratos.forEach(function(c){ if (c.associadosIds) c.associadosIds = c.associadosIds.filter(function(aid){ return aid !== id; }); });
      salvarAssociados().then(function(){ salvar().then(render); });
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-vincular-assoc]'), function(el){
    el.onclick = function(){
      var cid = parseInt(el.getAttribute('data-vincular-assoc'));
      var sel = document.getElementById('assoc-add-'+cid);
      var aid = parseInt(sel.value);
      if (!aid) return;
      var c = contratos.filter(function(x){ return x.id === cid; })[0];
      if (!c.associadosIds) c.associadosIds = [];
      if (c.associadosIds.indexOf(aid) === -1) c.associadosIds.push(aid);
      salvar().then(render);
    };
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-desvincular-assoc]'), function(el){
    el.onclick = function(){
      var partes = el.getAttribute('data-desvincular-assoc').split(':').map(Number);
      var c = contratos.filter(function(x){ return x.id === partes[0]; })[0];
      c.associadosIds = (c.associadosIds||[]).filter(function(id){ return id !== partes[1]; });
      salvar().then(render);
    };
  });

  var faOrgao = document.getElementById('fa-orgao'); if (faOrgao) faOrgao.onchange = function(){ filtrosAtas.orgao = faOrgao.value; paginaAtas = 1; render(); };
  var faAno = document.getElementById('fa-ano'); if (faAno) faAno.onchange = function(){ filtrosAtas.ano = faAno.value; paginaAtas = 1; render(); };
  var faBusca = document.getElementById('fa-busca'); if (faBusca) faBusca.oninput = function(){ filtrosAtas.busca = faBusca.value; paginaAtas = 1; render(); var el2 = document.getElementById('fa-busca'); if(el2) el2.focus(); };
  var faLimpar = document.getElementById('fa-limpar'); if (faLimpar) faLimpar.onclick = function(){ filtrosAtas = { orgao:'Todos', ano:'Todos', busca:'' }; paginaAtas = 1; render(); };

  var pagAnt = document.getElementById('atas-pag-anterior'); if (pagAnt) pagAnt.onclick = function(){ paginaAtas = Math.max(1, paginaAtas - 1); render(); };
  var pagProx = document.getElementById('atas-pag-proxima'); if (pagProx) pagProx.onclick = function(){ paginaAtas = paginaAtas + 1; render(); };

  var btnImprimir = document.getElementById('btn-imprimir-atas');
  if (btnImprimir) btnImprimir.onclick = function(){ imprimirRelatorioAtas(); };

  var btnNovaAta = document.getElementById('btn-nova-ata');
  if (btnNovaAta) btnNovaAta.onclick = function(){ novaAtaAberta = !novaAtaAberta; render(); };
  var naAtaCancelar = document.getElementById('na-ata-cancelar');
  if (naAtaCancelar) naAtaCancelar.onclick = function(){ novaAtaAberta = false; render(); };
  var naAtaSalvar = document.getElementById('na-ata-salvar');
  if (naAtaSalvar) naAtaSalvar.onclick = function(){
    var codigo = document.getElementById('na-codigo').value.trim();
    var texto = document.getElementById('na-texto').value.trim();
    if (!codigo || !texto) return;
    var ano = document.getElementById('na-ano').value.trim() || '-';
    var orgao = document.getElementById('na-orgao').value;
    var newId = atas.reduce(function(m,a){ return Math.max(m,a.id); }, 0) + 1;
    atas.unshift({ id: newId, codigo: codigo, orgao: orgao, ano: ano, texto: texto, linkDrive: '' });
    novaAtaAberta = false;
    salvarAtas().then(render);
  };

  Array.prototype.forEach.call(app.querySelectorAll('[data-add-link-ata]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-add-link-ata'));
      var url = prompt('Cole o link do Drive para esta ata:');
      if (!url) return;
      var a = atas.filter(function(x){ return x.id === id; })[0];
      a.linkDrive = url.trim();
      salvarAtas().then(render);
    };
  });

  Array.prototype.forEach.call(app.querySelectorAll('[data-editar-ata]'), function(el){
    el.onclick = function(){ editandoAtaId = parseInt(el.getAttribute('data-editar-ata')); render(); };
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-cancelar-edit-ata]'), function(el){
    el.onclick = function(){ editandoAtaId = null; render(); };
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-salvar-ata]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-salvar-ata'));
      var a = atas.filter(function(x){ return x.id === id; })[0];
      a.ano = document.getElementById('ea-ano-'+id).value.trim() || '-';
      a.codigo = document.getElementById('ea-codigo-'+id).value.trim();
      a.orgao = document.getElementById('ea-orgao-'+id).value;
      a.texto = document.getElementById('ea-texto-'+id).value.trim();
      editandoAtaId = null;
      salvarAtas().then(render);
    };
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-del-ata]'), function(el){
    el.onclick = function(){
      var id = parseInt(el.getAttribute('data-del-ata'));
      if (!confirm('Excluir esta deliberacao?')) return;
      atas = atas.filter(function(a){ return a.id !== id; });
      salvarAtas().then(render);
    };
  });

  var btnToggleImport = document.getElementById('btn-toggle-import');
  if (btnToggleImport) btnToggleImport.onclick = function(){
    importandoPlanilha = !importandoPlanilha;
    previewImportacao = null;
    erroImportacao = '';
    render();
  };

  var dropzone = document.getElementById('import-dropzone');
  var fileInput = document.getElementById('import-file');
  if (dropzone && fileInput) {
    dropzone.onclick = function(){ fileInput.click(); };
    fileInput.onchange = function(){
      if (fileInput.files && fileInput.files[0]) lerArquivoImportacao(fileInput.files[0]);
    };
    dropzone.ondragover = function(e){ e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = function(){ dropzone.classList.remove('dragover'); };
    dropzone.ondrop = function(e){
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files[0]) lerArquivoImportacao(e.dataTransfer.files[0]);
    };
  }

  var btnConfirmarImport = document.getElementById('btn-confirmar-import');
  if (btnConfirmarImport) btnConfirmarImport.onclick = function(){
    if (!previewImportacao) return;
    var proximoId = atas.reduce(function(m,a){ return Math.max(m,a.id); }, 0) + 1;
    previewImportacao.forEach(function(r){
      atas.push({ id: proximoId++, orgao: r.orgao, ano: r.ano, codigo: r.codigo, texto: r.texto, linkDrive: '' });
    });
    previewImportacao = null;
    importandoPlanilha = false;
    salvarAtas().then(render);
  };
  var btnCancelarImport = document.getElementById('btn-cancelar-import');
  if (btnCancelarImport) btnCancelarImport.onclick = function(){
    previewImportacao = null;
    erroImportacao = '';
    render();
  };
}

carregar();
</script>
</body>
</html>
